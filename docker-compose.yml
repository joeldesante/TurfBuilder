services:
  postgres:
    platform: linux/amd64
    image: postgis/postgis:18-3.6
    container_name: turfbuilder_postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=db_password
      - POSTGRES_DB=postgres
      - TZ=${TZ}
    shm_size: 128mb
    restart: ${RESTART_POLICY}

  frontend:
    container_name: turfbuilder_app
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - '5173:5173'
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - postgres
    restart: unless-stopped
  nats:
    image: nats:2.10
    container_name: nats-turfbuilder
    restart: unless-stopped
    command: [
      "-js",
      "-m", "8222",
      "--store_dir", "/data/jetstream"
    ]
    ports:
      - "4222:4222"   # client connections
      - "8222:8222"   # monitoring
    volumes:
      - nats_data:/data/jetstream
volumes:
  postgres_data:
  nats_data:
